plugins {
    id 'fabric-loom' version '1.6-SNAPSHOT'
}

version = '1.0.0'
group = 'com.runtoolkit'

repositories {
    mavenCentral()
    maven { url 'https://maven.fabricmc.net/' }
}

dependencies {
    minecraft 'com.mojang:minecraft:1.21.5'
    mappings 'net.fabricmc:yarn:1.21.5+build.1:v2'

    modImplementation 'net.fabricmc:fabric-loader:0.16.10'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.119.0+1.21.5'

    // GameTest support (included in fabric-api, but explicit for clarity)
    modImplementation 'net.fabricmc.fabric-api:fabric-gametest-api-v1:0.119.0+1.21.5'
}

loom {
    runs {
        gametest {
            server()
            name 'Game Test'
            vmArgs '-Dfabric-api.gametest=true'
            vmArgs '-Dfabric-api.gametest.report.file=build/test-report.xml'
        }
    }
}

tasks.register('runGameTestServer', JavaExec) {
    dependsOn 'classes'
    group = 'fabric'
    description = 'Runs the GameTest server'

    classpath = sourceSets.main.runtimeClasspath
    main = 'net.fabricmc.loader.impl.launch.knot.KnotServer'

    args = ['--nogui']
    systemProperties = [
        'fabric-api.gametest': 'true',
        'fabric-api.gametest.report.file': 'build/test-report.xml'
    ]
}