name: CI

on:
  push:
    branches: [main, workflows]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # =====================================================================
  # lint — mecha, JSON, mcfunction pre-check, pack.mcmeta
  # =====================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Gradle lint
        run: chmod +x gradlew && ./gradlew lint --no-daemon

  # =====================================================================
  # build — matrix zips (1_20_3, 1_20_5, pre_1_21_4, 1_21_5, 1_21_6, full)
  # =====================================================================
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle buildAll
        run: chmod +x gradlew && ./gradlew buildAll --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: dataLib-datapacks
          path: build/dist/*.zip
          retention-days: 14
          if-no-files-found: error

  # =====================================================================
  # release — only on push to main
  # =====================================================================
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew zipFull --no-daemon
          ./gradlew release --no-daemon

  # =====================================================================
  # generate-build-py — only on push to 'workflows' branch
  # Kept out of Gradle: this job commits + pushes to the repo, which is
  # a CI/VCS action, not a build responsibility.
  # =====================================================================
  generate-build-py:
    if: github.event_name == 'push' && github.ref == 'refs/heads/workflows'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run generate build script
        run: python3 .github/scripts/generate_buid-py.py
      - uses: actions/upload-artifact@v7
        with:
          name: build-py
          path: build.py
      - name: Commit and push build.py
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build.py
          git diff --cached --quiet && exit 0
          git commit -m "Auto generate build.py"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle createSourceZip
        run: chmod +x gradlew && ./gradlew createSourceZip --no-daemon
