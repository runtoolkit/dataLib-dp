name: Datapack Auto Fixer (Safe Mode)

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch to fix'
        required: true
        default: 'main'
      fix_branch:
        description: 'Fix branch name'
        required: true
        default: 'datapack-fixer/main'
      warn_mode:
        description: 'Fail on warnings?'
        required: true
        default: 'fail'
        type: choice
        options:
          - 'fail'
          - 'warn'

  schedule:
    - cron: '0 3 * * *'

env:
  PYTHONUNBUFFERED: '1'
  MAX_FILES: 10000

jobs:
  safe-fix:
    runs-on: ubuntu-latest
    if: github.repository == 'runtoolkit/dataLib'
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beet mecha

      - name: Create isolated workspace
        run: |
          mkdir -p /tmp/datapack-fixer/{original,build,patched}
          cp -r . /tmp/datapack-fixer/original

      - name: Run Safe Datapack Fixer
        id: fixer
        timeout-minutes: 10
        env:
          WARN_MODE: ${{ github.event.inputs.warn_mode || 'fail' }}
        run: |
          python3 scripts/safe_datapack_fixer.py \
            --base /tmp/datapack-fixer/original \
            --build-dir /tmp/datapack-fixer/build \
            --patched-dir /tmp/datapack-fixer/patched \
            --warn-mode "$WARN_MODE" \
            --max-files ${{ env.MAX_FILES }}

      # ==========================================
      # REAL FABRIC GAMETEST (Server + Client)
      # ==========================================
      - name: Setup Java 21
        if: steps.fixer.outputs.changes_detected == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        if: steps.fixer.outputs.changes_detected == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8

      - name: Run Fabric GameTest (Server + Client + Fail Detection)
        if: steps.fixer.outputs.changes_detected == 'true'
        timeout-minutes: 20
        run: |
          echo "=== SERVER GameTest ==="
          ./gradlew runGameTestServer --info || true

          echo "=== CLIENT GameTest ==="
          ./gradlew runClientGameTest --info || true

          echo "=== Checking for Fail / Failed to load ==="
          
          # Fail: ile başlayan mesaj kontrolü
          if grep -r "Fail:" build/ 2>/dev/null; then
            echo "::error::FAIL message detected in GameTest"
            exit 1
          fi

          # Failed to load hataları
          if grep -r "Failed to load" build/ 2>/dev/null; then
            echo "::error::'Failed to load' errors detected"
            exit 1
          fi

          echo "=== GameTest completed successfully ==="

      - name: Prepare safe commit
        if: steps.fixer.outputs.changes_detected == 'true'
        run: |
          cd /tmp/datapack-fixer/original
          SAFE_FILES=()
          while IFS= read -r -d '' file; do
            if [[ "$file" == data/* || "$file" == pack.mcmeta || "$file" == beet.json ]]; then
              SAFE_FILES+=("$file")
            fi
          done < <(find . -type f -print0)

          if [ ${#SAFE_FILES[@]} -gt 0 ]; then
            git add "${SAFE_FILES[@]}"
          fi

      - name: Create fix branch and commit
        if: steps.fixer.outputs.changes_detected == 'true'
        run: |
          FIX_BRANCH="${{ github.event.inputs.fix_branch || 'datapack-fixer/main' }}"
          cd /tmp/datapack-fixer/original
          git checkout -B "$FIX_BRANCH"

          if ! git diff --cached --quiet; then
            git commit -m "Auto-fix: Mecha + 1.21.5+ compat + GameTest validated"
          fi

      - name: Push fix branch
        if: steps.fixer.outputs.changes_detected == 'true'
        run: |
          FIX_BRANCH="${{ github.event.inputs.fix_branch || 'datapack-fixer/main' }}"
          cd /tmp/datapack-fixer/original
          git push -u origin "$FIX_BRANCH" --force-with-lease || echo "::warning::Push failed (branch protection?)"

      - name: Final status
        run: |
          echo "=== Datapack Auto Fixer completed ==="
          echo "Changes: ${{ steps.fixer.outputs.changes_detected }}"
