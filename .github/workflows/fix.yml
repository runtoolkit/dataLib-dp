name: Datapack Auto Fixer

on:
  push:
    branches: [ "main", "devlop" ]
  pull_request:
    branches: [ "main", "devlop" ]

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest

    permissions:
      # Required to commit and push the fixed changes back to the repository
      contents: write 

    steps:
    # 1. Checkout the Repository
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # 2. Setup Node.js Environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Install Spyglass CLI Globally
    - name: Install Spyglass CLI
      run: npm install -g @spyglassmc/cli

    # 4. Lint and Auto-Fix Datapack Files
    - name: Run Spyglass Fixer
      run: |
        spyglassmc format . --fix
        spyglassmc lint .

    # 5. Commit and Push Fixed Changes
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if there are any formatting changes or fixes
        if [ -n "$(git status --porcelain)" ]; then
          git add .
          git commit -m "style: automatically format datapack files via Spyglass CLI"
          git push
        else
          echo "No changes detected. Everything is clean and well-formatted."
        fi
