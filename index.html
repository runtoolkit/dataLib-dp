<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<meta name="description" content="Official website of Legends11 / runtoolkit. Coming soon.">
<meta name="theme-color" content="#111827">
<meta name="color-scheme" content="dark">

<style>
:root{
    color-scheme: dark;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:24px;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    color:#fff;
}

.container{
    width:100%;
    max-width:700px;
    text-align:center;
    padding:48px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    animation:fade .8s ease;
}

.badge{
    display:inline-block;
    padding:8px 18px;
    margin-bottom:20px;
    border-radius:999px;
    background:#2563eb;
    font-weight:700;
    font-size:.95rem;
}

h1{
    font-size:3rem;
    margin-bottom:18px;
}

p{
    color:#cbd5e1;
    font-size:1.15rem;
    line-height:1.7;
    margin-bottom:36px;
}

.footer{
    color:#94a3b8;
    font-size:.9rem;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(16px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:600px){

    .container{
        padding:32px 24px;
    }

    h1{
        font-size:2.2rem;
    }

    p{
        font-size:1rem;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="badge">🚧 Coming Soon</div>

    <h1>We're working on something exciting.</h1>

    <p>
        This website is currently under development.<br>
        Please check back later for updates.
    </p>

    <div class="footer">
        © 2025–2026 Legends11 / runtoolkit. All rights reserved.
    </div>

</div>

</body>
</html>
